name: Bug report
description: Report something broken in the web app, agent, or generated Arduino code.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Tell us what broke and what you expected instead.
    validations:
      required: true
  - type: input
    id: board
    attributes:
      label: Board or FQBN
      placeholder: arduino:avr:uno
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: Open app, add component, compile...
  - type: textarea
    id: logs
    attributes:
      label: Agent or browser logs
      render: text
