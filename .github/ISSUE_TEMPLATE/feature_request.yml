name: Feature request
description: Suggest a new feature, lesson, workflow, or improvement.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: goal
    attributes:
      label: What should this help users do?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed approach
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web app
        - Local agent
        - Hardware catalog
        - Lessons
        - Code generation
        - Documentation
